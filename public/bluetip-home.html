<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLUE-TIP - Mobile Welding Services</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/customer.css">
  <link rel="stylesheet" href="/css/logo.css">
  <style>
    #bluetip-splash-svg { width: 260px; height: auto; }
    #bluetip-brand-name { font-family: 'Share Tech Mono', monospace; font-size: 32px; letter-spacing: 8px; color: var(--blue); text-shadow: 0 0 20px var(--blue-glow); }
    #bluetip-brand-sub  { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 4px; color: var(--blue-dark); margin-top: 6px; }
    .bluetip-splash-inner { padding: 40px 0; gap: 24px; }
    /* Make option boxes flex on bluetip page (no rack/cable absolute layout) */
    .bluetip-splash-inner .splash-options {
      width: auto;
      height: auto;
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 16px;
      opacity: 1;
    }
    .bluetip-splash-inner .splash-option-box {
      position: relative;
      left: auto !important;
    }
    @media (max-width: 768px) {
      #bluetip-splash-svg  { width: 180px !important; }
      #bluetip-brand-name  { font-size: 22px !important; letter-spacing: 5px !important; }
      #bluetip-brand-sub   { font-size: 9px !important; letter-spacing: 3px !important; }
      .bluetip-splash-inner { padding: 20px 16px !important; gap: 16px !important; }
      .bluetip-splash-inner .splash-option-box { width: calc(44vw - 8px) !important; height: 160px !important; padding: 14px 16px !important; }
      .bluetip-splash-inner .option-icon { width: 40px !important; height: 40px !important; }
    }
    @media (max-width: 480px) {
      #bluetip-splash-svg  { width: 140px !important; }
      #bluetip-brand-name  { font-size: 18px !important; letter-spacing: 4px !important; }
      .bluetip-splash-inner { padding: 16px 12px !important; gap: 12px !important; }
      .bluetip-splash-inner .splash-options { gap: 10px !important; }
      .bluetip-splash-inner .splash-option-box { width: calc(44vw - 8px) !important; height: 150px !important; padding: 12px 14px !important; }
      .bluetip-splash-inner .option-icon { width: 36px !important; height: 36px !important; }
    }
  </style>
</head>
<body>
  <canvas id="matrix-rain"></canvas>

  <!-- Splash Screen -->
  <div id="logo-splash" class="logo-splash-overlay">
    <a href="/login?mode=customer&next=/bluetip-profile&service=bluetip" class="splash-signin-btn" id="splash-signin">
      <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="5" r="2.5"/>
        <path d="M3 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke-linecap="round"/>
      </svg>
      CLIENT PORTAL
    </a>

    <div class="pre-connection-status" id="pre-connection-status">
      <span class="status-text">ESTABLISHING CONNECTION...</span>
    </div>

    <div class="splash-logo-container bluetip-splash-inner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px 0;">
      <!-- Welding torch SVG splash logo -->
      <svg id="bluetip-splash-svg" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" style="color:var(--blue);">
        <!-- Cable hose (thick, curved behind body) -->
        <path d="M68 100 Q40 118 20 103 Q2 88 16 66 Q28 48 44 52" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
        <!-- Cable connector nub -->
        <circle cx="68" cy="100" r="5.5" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="2.2"/>
        <circle cx="68" cy="100" r="2.5" fill="currentColor" opacity="0.45"/>
        <!-- Gun body (main housing with fill) -->
        <path d="M44 33 L112 33 Q117 33 117 38 L117 62 Q117 67 112 67 L44 67 Q39 67 39 38 Q39 33 44 33 Z" fill="currentColor" fill-opacity="0.07" stroke="currentColor" stroke-width="3"/>
        <!-- Body panel divider -->
        <line x1="80" y1="33" x2="80" y2="67" stroke="currentColor" stroke-width="1.2" opacity="0.28"/>
        <!-- Strain relief bump on back of body -->
        <path d="M39 43 Q34 50 39 57" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        <!-- Rivet dots -->
        <circle cx="92" cy="39" r="2.2" fill="currentColor" opacity="0.35"/>
        <circle cx="92" cy="61" r="2.2" fill="currentColor" opacity="0.35"/>
        <circle cx="55" cy="39" r="2.2" fill="currentColor" opacity="0.35"/>
        <circle cx="55" cy="61" r="2.2" fill="currentColor" opacity="0.35"/>
        <!-- Control button panel -->
        <rect x="97" y="44" width="9" height="6" rx="1.2" fill="none" stroke="currentColor" stroke-width="1" opacity="0.32"/>
        <!-- Pistol grip (handle body) -->
        <path d="M60 67 L57 100 L78 100 L78 67 Z" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-width="2.8" stroke-linejoin="round"/>
        <!-- Trigger guard (D-loop) -->
        <path d="M60 67 Q52 78 55 92 Q57 98 60 100" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        <!-- Grip ridges (texture) -->
        <line x1="61" y1="72" x2="59" y2="83" stroke="currentColor" stroke-width="1.8" opacity="0.35"/>
        <line x1="66" y1="72" x2="64" y2="83" stroke="currentColor" stroke-width="1.8" opacity="0.35"/>
        <line x1="71" y1="72" x2="69" y2="83" stroke="currentColor" stroke-width="1.8" opacity="0.35"/>
        <line x1="76" y1="72" x2="74" y2="83" stroke="currentColor" stroke-width="1.8" opacity="0.35"/>
        <!-- Trigger lever -->
        <path d="M68 67 Q64 77 66 82 Q70 84 72 82 Q74 77 70 67" fill="currentColor" fill-opacity="0.15" stroke="currentColor" stroke-width="2.2"/>
        <!-- Gooseneck / swanneck (S-curve tube) -->
        <path d="M117 37 Q130 26 138 30 Q142 32 144 35" fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/>
        <path d="M117 63 Q130 74 138 70 Q142 68 144 65" fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round"/>
        <!-- Gooseneck center depth line -->
        <path d="M117 50 Q131 50 144 50" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
        <!-- Nozzle (filled cylinder) -->
        <rect x="143" y="33" width="26" height="34" rx="2.5" fill="currentColor" fill-opacity="0.09" stroke="currentColor" stroke-width="3"/>
        <!-- Nozzle groove ring -->
        <line x1="150" y1="33" x2="150" y2="67" stroke="currentColor" stroke-width="1.5" opacity="0.45"/>
        <!-- Nozzle tip band -->
        <line x1="164" y1="33" x2="164" y2="67" stroke="currentColor" stroke-width="1" opacity="0.3"/>
        <!-- Diffuser holes -->
        <circle cx="158" cy="41" r="2"   fill="currentColor" opacity="0.38"/>
        <circle cx="158" cy="50" r="2"   fill="currentColor" opacity="0.38"/>
        <circle cx="158" cy="59" r="2"   fill="currentColor" opacity="0.38"/>
        <!-- Contact tip (tapered point) -->
        <path d="M169 37 L178 50 L169 63 Z" fill="currentColor" opacity="0.75"/>
        <!-- Arc outer halos -->
        <circle cx="182" cy="50" r="14" fill="none" stroke="#FF4500" stroke-width="1.2" opacity="0.14"/>
        <circle cx="182" cy="50" r="8"  fill="none" stroke="#FF4500" stroke-width="1.5" opacity="0.28"/>
        <!-- Arc core -->
        <circle cx="182" cy="50" r="5"  fill="#FF4500" opacity="0.95"/>
        <!-- Spatter rays -->
        <line x1="182" y1="50" x2="198" y2="28" stroke="#ffbd2e" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="182" y1="50" x2="200" y2="50" stroke="#FF4500" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="182" y1="50" x2="198" y2="72" stroke="#ffbd2e" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="182" y1="50" x2="192" y2="24" stroke="#ffbd2e" stroke-width="2"   stroke-linecap="round"/>
        <line x1="182" y1="50" x2="192" y2="76" stroke="#ffbd2e" stroke-width="2"   stroke-linecap="round"/>
        <line x1="182" y1="50" x2="196" y2="37" stroke="#FF4500" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="182" y1="50" x2="196" y2="63" stroke="#FF4500" stroke-width="1.6" stroke-linecap="round"/>
        <!-- Spatter dots -->
        <circle cx="198" cy="28" r="3.5" fill="#ffbd2e"/>
        <circle cx="200" cy="50" r="3"   fill="#FF4500"/>
        <circle cx="198" cy="72" r="3.5" fill="#ffbd2e"/>
        <circle cx="192" cy="22" r="2.2" fill="#ffbd2e" opacity="0.7"/>
        <circle cx="192" cy="78" r="2.2" fill="#ffbd2e" opacity="0.7"/>
        <circle cx="196" cy="34" r="1.8" fill="#FF4500" opacity="0.8"/>
        <circle cx="196" cy="66" r="1.8" fill="#FF4500" opacity="0.8"/>
      </svg>

      <!-- Brand name -->
      <div style="text-align:center;">
        <div id="bluetip-brand-name">BLUE-TIP</div>
        <div id="bluetip-brand-sub">MOBILE WELDING SERVICES</div>
      </div>

      <!-- Connection status -->
      <div class="connection-status">
        <span class="status-text">ESTABLISHING CONNECTION...</span>
      </div>

      <!-- Option Boxes -->
      <div class="splash-options" id="splash-options">
        <button class="splash-option-box" id="option-chat">
          <svg class="box-border-data" viewBox="0 0 200 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <rect class="border-data-path" x="1" y="1" width="198" height="178" rx="7"/>
          </svg>
          <div class="option-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" fill="none" stroke="currentColor" stroke-width="2"/>
              <line x1="6" y1="9" x2="18" y2="9" stroke="currentColor" stroke-width="2"/>
              <line x1="6" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="2"/>
            </svg>
          </div>
          <div class="option-label">START CHAT</div>
          <div class="option-description">Welding AI Assistant</div>
        </button>

        <button class="splash-option-box" id="option-contact">
          <svg class="box-border-data" viewBox="0 0 200 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <rect class="border-data-path" x="1" y="1" width="198" height="178" rx="7"/>
          </svg>
          <div class="option-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M3 7l9 6 9-6" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
          </div>
          <div class="option-label">REQUEST JOB</div>
          <div class="option-description">Book a Welding Service</div>
        </button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initMatrixRain } from '/js/matrix-rain.js';

    const rain = initMatrixRain('matrix-rain');
    if (rain) rain.start();

    document.addEventListener('DOMContentLoaded', async () => {
      const splashOptions = document.getElementById('splash-options');
      const optionChat    = document.getElementById('option-chat');
      const optionContact = document.getElementById('option-contact');
      const signinBtn     = document.getElementById('splash-signin');
      const preStatus     = document.getElementById('pre-connection-status');

      // Show boxes immediately (no rack animation needed)
      if (preStatus) preStatus.style.display = 'none';
      splashOptions?.classList.add('show');
      optionChat?.classList.add('show', 'cable-connected');
      optionContact?.classList.add('show', 'cable-connected');
      signinBtn?.classList.add('visible');

      // Wait for user choice
      const choice = await new Promise(resolve => {
        optionChat?.addEventListener('click',    () => resolve('chat'));
        optionContact?.addEventListener('click', () => resolve('contact'));
      });

      // Fade out splash then navigate
      const overlay = document.getElementById('logo-splash');
      overlay?.classList.add('fade-out');
      await new Promise(r => setTimeout(r, 600));

      if (choice === 'chat') {
        window.location.href = '/chat';
      } else {
        window.location.href = '/bluetip-contact';
      }
    });
  </script>
</body>
</html>
