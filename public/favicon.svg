<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="64" height="64" fill="#0a0a0a"/>

  <!-- Network Switch -->
  <g stroke="#5DADE2" fill="none">
    <!-- Switch Body -->
    <rect x="8" y="22" width="48" height="20" rx="2" stroke-width="2"/>

    <!-- Network Ports -->
    <rect x="12" y="26" width="4" height="4" rx="0.5" stroke-width="1.5"/>
    <rect x="18" y="26" width="4" height="4" rx="0.5" stroke-width="1.5"/>
    <rect x="24" y="26" width="4" height="4" rx="0.5" stroke-width="1.5"/>
    <rect x="30" y="26" width="4" height="4" rx="0.5" stroke-width="1.5"/>
    <rect x="36" y="26" width="4" height="4" rx="0.5" stroke-width="1.5"/>
    <rect x="42" y="26" width="4" height="4" rx="0.5" stroke-width="1.5"/>
    <rect x="48" y="26" width="4" height="4" rx="0.5" stroke-width="1.5"/>
  </g>

  <!-- Status LEDs - Alternating Green and Yellow -->
  <circle cx="14" cy="36" r="2" fill="#27c93f" opacity="0.9"/>
  <circle cx="20" cy="36" r="2" fill="#ffbd2e" opacity="0.9"/>
  <circle cx="26" cy="36" r="2" fill="#27c93f" opacity="0.9"/>
  <circle cx="32" cy="36" r="2" fill="#ffbd2e" opacity="0.9"/>
  <circle cx="38" cy="36" r="2" fill="#27c93f" opacity="0.9"/>
  <circle cx="44" cy="36" r="2" fill="#ffbd2e" opacity="0.9"/>
  <circle cx="50" cy="36" r="2" fill="#27c93f" opacity="0.9"/>

  <!-- Power LED -->
  <circle cx="52" cy="30" r="2.5" fill="#5DADE2" filter="drop-shadow(0 0 6px #5DADE2)"/>
</svg>
