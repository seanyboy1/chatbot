<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLUE-MESHTASTIC</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/logo.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    /* ── Page Layout ───────────────────────────────────── */
    body { overflow: hidden; }

    .mesh-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 54px);
      margin-top: 54px;
      padding: 16px;
      gap: 12px;
      box-sizing: border-box;
      position: relative;
      z-index: 1;
    }

    /* ── Top bar ───────────────────────────────────────── */
    .mesh-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .mesh-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--blue-dark);
      flex: 1;
    }

    .mesh-stat-chip {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--blue-dim);
      background: rgba(93,173,226,0.06);
      border: 1px solid var(--blue-dark);
      padding: 4px 10px;
      border-radius: 2px;
    }

    .mesh-stat-chip span {
      color: var(--blue);
    }

    .mesh-stat-chip {
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, box-shadow 0.15s, color 0.15s;
    }

    .mesh-stat-chip:hover {
      border-color: var(--blue-dim);
      color: var(--blue);
    }

    .mesh-stat-chip.active {
      border-color: var(--blue);
      color: var(--blue);
      box-shadow: 0 0 8px var(--blue-glow);
    }

    /* ── Main grid ─────────────────────────────────────── */
    .mesh-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ───────────────────────────────────────── */
    .mesh-sidebar {
      background: var(--bg-terminal);
      border: 1px solid var(--blue-dark);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .mesh-sidebar-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: var(--blue-dark);
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(93,173,226,0.12);
    }

    .mesh-node-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }

    .mesh-node-list::-webkit-scrollbar { width: 4px; }
    .mesh-node-list::-webkit-scrollbar-track { background: transparent; }
    .mesh-node-list::-webkit-scrollbar-thumb { background: var(--blue-dark); border-radius: 2px; }

    .mesh-node-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(93,173,226,0.06);
      transition: background 0.15s;
    }

    .mesh-node-item:hover {
      background: rgba(93,173,226,0.07);
    }

    .mesh-node-item.selected {
      background: rgba(93,173,226,0.12);
      border-left: 2px solid var(--blue);
    }

    .mesh-node-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #FF4500;
      text-shadow: 0 0 8px rgba(255,69,0,0.4);
      letter-spacing: 1px;
      margin-bottom: 3px;
    }

    .mesh-node-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--blue-dark);
      letter-spacing: 0.5px;
    }

    .mesh-node-status {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .mesh-node-status.online  { background: #27c93f; box-shadow: 0 0 6px #27c93f; }
    .mesh-node-status.offline { background: var(--blue-dark); }

    .mesh-no-nodes {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--blue-dark);
      text-align: center;
      padding: 24px 14px;
      letter-spacing: 1px;
    }

    /* ── Add Node Form ─────────────────────────────────── */
    .mesh-add-form {
      border-top: 1px solid rgba(93,173,226,0.12);
      padding: 12px 14px;
    }

    .mesh-add-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--blue-dark);
      margin-bottom: 8px;
    }

    .mesh-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--blue-dark);
      color: var(--blue);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 4px 0;
      outline: none;
      letter-spacing: 1px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }

    .mesh-input::placeholder { color: rgba(93,173,226,0.25); }

    .mesh-coords {
      display: flex;
      gap: 8px;
    }

    .mesh-coords .mesh-input { margin-bottom: 0; }

    .mesh-add-btn {
      width: 100%;
      margin-top: 10px;
      background: transparent;
      border: 1px solid var(--blue-dark);
      color: var(--blue-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 7px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mesh-add-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
      box-shadow: 0 0 8px var(--blue-glow);
    }

    .mesh-img-label {
      display: block;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--blue-dim);
      border: 1px dashed var(--blue-dark);
      border-radius: 3px;
      padding: 7px 10px;
      cursor: pointer;
      margin-bottom: 8px;
      text-align: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .mesh-img-label:hover { border-color: var(--blue); color: var(--blue); }
    .mesh-img-preview {
      width: 100%;
      max-height: 120px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--blue-dark);
      margin-bottom: 8px;
    }
    .mesh-popup-img {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      border-radius: 3px;
      margin-bottom: 6px;
      border: 1px solid var(--blue-dark);
    }

    .mesh-form-msg {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      min-height: 14px;
      margin-top: 6px;
    }

    /* ── Map Panel ─────────────────────────────────────── */
    .mesh-map-panel {
      background: var(--bg-terminal);
      border: 1px solid var(--blue-dark);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    #mesh-map {
      width: 100%;
      height: 100%;
    }

    /* Override Leaflet dark theme */
    .leaflet-container {
      background: #0a0f1a;
      font-family: 'Share Tech Mono', monospace;
    }

    .leaflet-popup-content-wrapper {
      background: rgba(5,12,26,0.97);
      border: 1px solid var(--blue-dark);
      border-radius: 3px;
      box-shadow: 0 0 20px rgba(93,173,226,0.3);
      color: var(--blue-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
    }

    .leaflet-popup-tip {
      background: var(--blue-dark);
    }

    .leaflet-popup-close-button {
      color: var(--blue-dark) !important;
      font-size: 16px !important;
    }

    .leaflet-control-zoom a {
      background: rgba(5,12,26,0.9);
      border-color: var(--blue-dark);
      color: var(--blue-dim);
      font-family: 'Share Tech Mono', monospace;
    }

    .leaflet-control-zoom a:hover {
      background: rgba(93,173,226,0.15);
      color: var(--blue);
    }

    .leaflet-control-attribution {
      background: rgba(5,12,26,0.7) !important;
      color: rgba(93,173,226,0.3) !important;
      font-size: 9px;
    }

    .leaflet-control-attribution a { color: rgba(93,173,226,0.4) !important; }

    /* Scan line overlay on map */
    .mesh-map-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Node detail popup ─────────────────────────────── */
    .mesh-popup-name {
      font-size: 13px;
      color: #FF4500;
      text-shadow: 0 0 8px rgba(255,69,0,0.4);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .mesh-popup-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 3px;
    }

    .mesh-popup-label { color: var(--blue-dark); font-size: 9px; letter-spacing: 1.5px; }
    .mesh-popup-val   { color: var(--blue); font-size: 10px; }

    .mesh-popup-btn {
      margin-top: 6px;
      background: transparent;
      border: 1px solid var(--blue-dark);
      color: var(--blue-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      padding: 4px 10px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
      display: block;
    }

    .mesh-popup-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .mesh-popup-btn.danger {
      border-color: rgba(255,69,0,0.3);
      color: rgba(255,69,0,0.6);
    }

    .mesh-popup-btn.danger:hover {
      border-color: #FF4500;
      color: #FF4500;
      box-shadow: 0 0 6px rgba(255,69,0,0.3);
    }

    .mesh-popup-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--blue-dark);
      color: var(--blue);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 3px 0;
      outline: none;
      box-sizing: border-box;
      margin-bottom: 6px;
    }

    /* ── Map coords tooltip ────────────────────────────── */
    .mesh-crosshair-tip {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--blue-dark);
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 1001;
    }

    /* ── Mobile ────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { overflow: auto; }

      .mesh-container {
        height: auto;
        padding: 12px;
      }

      .mesh-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto 360px;
      }

      .mesh-sidebar {
        max-height: 300px;
      }
    }
  </style>
</head>

  <script type="module">
    import { initMatrixRain } from '/js/matrix-rain.js';
    import { getToken, getRole, clearAuth } from '/js/auth.js';

    // Auth guard — redirect to login if not admin
    if (!getToken() || getRole() !== 'admin') {
      window.location.href = '/login';
    }

    // Matrix rain
    const rain = initMatrixRain('matrix-rain');
    if (rain) rain.start();

    // Nav buttons
    document.getElementById('back-btn').addEventListener('click', () => { window.location.href = '/dashboard'; });
    document.getElementById('signout-btn').addEventListener('click', () => { clearAuth(); fetch('/api/auth/logout', { method: 'POST' }).finally(() => { window.location.href = '/login'; }); });

    // Hover effects for nav buttons
    ['back-btn', 'signout-btn'].forEach(id => {
      const btn = document.getElementById(id);
      btn.addEventListener('mouseover', function() {
        this.style.color = 'var(--blue)';
        this.style.borderColor = 'var(--blue)';
        this.style.boxShadow = '0 0 8px var(--blue-glow)';
      });
      btn.addEventListener('mouseout', function() {
        this.style.color = 'var(--blue-dim)';
        this.style.borderColor = 'var(--blue-dark)';
        this.style.boxShadow = 'none';
      });
    });

    // ── Leaflet Map ───────────────────────────────────────
  </script>
  <!-- Leaflet JS (loaded after module to avoid ordering issues) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    import { getToken } from '/js/auth.js';

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
    }

    async function uploadNodeImage(file) {
      const fd = new FormData();
      fd.append('image', file);
      const res = await fetch('/api/upload/node-image', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${getToken()}` },
        body: fd,
      });
      if (!res.ok) return null;
      const d = await res.json();
      return d.url || null;
    }

    async function apiLoadNodes() {
      const res = await fetch('/api/mesh/nodes', { headers: authHeaders() });
      if (res.status === 401 || res.status === 403) {
        window.location.href = '/login';
        return [];
      }
      const data = await res.json();
      return (data.nodes || []).map(n => ({
        id: n.nodeId, name: n.name, lat: n.lat, lon: n.lon,
        desc: n.desc || '', online: n.online !== false, addedAt: n.addedAt,
        imageUrl: n.imageUrl || '',
      }));
    }

    async function apiAddNode(node) {
      const res = await fetch('/api/mesh/nodes', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ nodeId: node.id, name: node.name, lat: node.lat, lon: node.lon, desc: node.desc, online: node.online }),
      });
      return res.ok;
    }

    async function apiUpdateNode(id, fields) {
      const res = await fetch(`/api/mesh/nodes/${id}`, {
        method: 'PUT', headers: authHeaders(),
        body: JSON.stringify(fields),
      });
      return res.ok;
    }

    async function apiDeleteNode(id) {
      const res = await fetch(`/api/mesh/nodes/${id}`, {
        method: 'DELETE', headers: authHeaders(),
      });
      return res.ok;
    }

    // Wait for Leaflet to load
    await new Promise(r => {
      if (window.L) return r();
      const check = setInterval(() => { if (window.L) { clearInterval(check); r(); } }, 50);
    });

    // Initialize map centered on US
    const map = L.map('mesh-map', {
      center: [39.5, -98.35],
      zoom: 4,
      zoomControl: true,
    });

    // Dark tile layer (CartoDB Dark Matter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    // Custom node icon — map pin with flag style
    function makeIcon(online) {
      const fill   = online ? '#27c93f' : '#3a5a7a';
      const stroke = online ? '#1a8f2a' : '#1a3a5c';
      const glow   = online ? `drop-shadow(0 0 5px #27c93f)` : 'none';
      return L.divIcon({
        className: '',
        html: `<svg width="24" height="34" viewBox="0 0 24 34" xmlns="http://www.w3.org/2000/svg" style="filter:${glow}">
          <!-- Pin body -->
          <path d="M12 2 C6.477 2 2 6.477 2 12 C2 19 12 32 12 32 C12 32 22 19 22 12 C22 6.477 17.523 2 12 2 Z"
                fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
          <!-- Inner dot -->
          <circle cx="12" cy="12" r="4" fill="rgba(0,0,0,0.35)"/>
          <circle cx="12" cy="12" r="2.5" fill="${online ? '#fff' : '#5D9BDB'}" opacity="0.9"/>
        </svg>`,
        iconSize: [24, 34],
        iconAnchor: [12, 34],
        popupAnchor: [0, -36],
      });
    }

    // State
    let nodes = [];
    const markers = {};
    let nodeFilter = 'all'; // 'all' | 'online' | 'offline'

    // Filter chip click handlers
    const chipMap = { all: 'chip-all', online: 'chip-online', offline: 'chip-offline' };
    Object.entries(chipMap).forEach(([filter, id]) => {
      document.getElementById(id).addEventListener('click', () => {
        nodeFilter = filter;
        Object.values(chipMap).forEach(cid => document.getElementById(cid).classList.remove('active'));
        document.getElementById(id).classList.add('active');
        render();
      });
    });

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function updateStats() {
      const online  = nodes.filter(n => n.online !== false).length;
      const offline = nodes.length - online;
      document.getElementById('mesh-node-count').textContent   = nodes.length;
      document.getElementById('mesh-online-count').textContent  = online;
      document.getElementById('mesh-offline-count').textContent = offline;
    }

    function buildPopupView(n) {
      return `
        ${n.imageUrl ? `<img class="mesh-popup-img" src="${escHtml(n.imageUrl)}" alt="node photo"/>` : ''}
        <div class="mesh-popup-name">${escHtml(n.name)}</div>
        <div class="mesh-popup-row">
          <span class="mesh-popup-label">LAT</span>
          <span class="mesh-popup-val">${Number(n.lat).toFixed(5)}</span>
        </div>
        <div class="mesh-popup-row">
          <span class="mesh-popup-label">LON</span>
          <span class="mesh-popup-val">${Number(n.lon).toFixed(5)}</span>
        </div>
        ${n.desc ? `<div class="mesh-popup-row"><span class="mesh-popup-label">INFO</span><span class="mesh-popup-val">${escHtml(n.desc)}</span></div>` : ''}
        <div class="mesh-popup-row">
          <span class="mesh-popup-label">STATUS</span>
          <span class="mesh-popup-val" style="color:${n.online !== false ? '#27c93f' : 'var(--blue-dark)'};">${n.online !== false ? 'ONLINE' : 'OFFLINE'}</span>
        </div>
        <button class="mesh-popup-btn" data-action="edit" data-id="${escHtml(n.id)}">EDIT</button>
        <button class="mesh-popup-btn" data-action="toggle" data-id="${escHtml(n.id)}">${n.online !== false ? 'MARK OFFLINE' : 'MARK ONLINE'}</button>
        <button class="mesh-popup-btn danger" data-action="delete" data-id="${escHtml(n.id)}">DELETE NODE</button>
      `;
    }

    function buildPopupEdit(n) {
      return `
        <div class="mesh-popup-label" style="margin-bottom:4px;">EDIT NODE</div>
        ${n.imageUrl ? `<img class="mesh-popup-img" src="${escHtml(n.imageUrl)}" alt="node photo" id="edit-img-preview-${escHtml(n.id)}"/>` : `<div id="edit-img-preview-${escHtml(n.id)}"></div>`}
        <label class="mesh-img-label" style="margin-bottom:6px;">
          <span class="edit-img-name">CHANGE PHOTO</span>
          <input type="file" class="edit-img-input" accept="image/*" style="display:none"/>
        </label>
        <input class="mesh-popup-input" data-field="name" value="${escHtml(n.name)}" placeholder="Name"/>
        <input class="mesh-popup-input" data-field="desc" value="${escHtml(n.desc||'')}" placeholder="Description"/>
        <div class="mesh-popup-label" style="margin-bottom:2px;">LAT</div>
        <input class="mesh-popup-input" data-field="lat" value="${Number(n.lat).toFixed(5)}" placeholder="Latitude"/>
        <div class="mesh-popup-label" style="margin-bottom:2px;">LON</div>
        <input class="mesh-popup-input" data-field="lon" value="${Number(n.lon).toFixed(5)}" placeholder="Longitude"/>
        <button class="mesh-popup-btn" data-action="save-edit" data-id="${escHtml(n.id)}">SAVE</button>
        <button class="mesh-popup-btn" data-action="cancel-edit" data-id="${escHtml(n.id)}">CANCEL</button>
      `;
    }

    function addMarker(n) {
      const m = L.marker([n.lat, n.lon], { icon: makeIcon(n.online !== false) })
        .addTo(map)
        .bindPopup(buildPopupView(n), { maxWidth: 300, minWidth: 260, closeOnClick: false });

      // Attach click handler once directly on the popup container element.
      // Leaflet calls stopPropagation on its popup, so document-level delegation
      // doesn't work — we must listen on the popup element itself.
      let attached = false;
      m.on('popupopen', (e) => {
        const el = e.popup.getElement();
        if (!el || attached) return;
        attached = true;

        el.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          const btn = ev.target.closest('[data-action]');
          if (!btn) return;
          const id     = btn.dataset.id;
          const action = btn.dataset.action;

          if (action === 'delete') {
            m.closePopup();
            await deleteNode(id);

          } else if (action === 'toggle') {
            const idx = nodes.findIndex(x => x.id === id);
            if (idx !== -1) {
              const newOnline = !(nodes[idx].online !== false);
              await apiUpdateNode(id, { online: newOnline });
              nodes[idx].online = newOnline;
              render();
              setTimeout(() => markers[id]?.openPopup(), 50);
            }

          } else if (action === 'edit') {
            const node = nodes.find(x => x.id === id);
            if (node) {
              const contentDiv = el.querySelector('.leaflet-popup-content');
              if (contentDiv) {
                contentDiv.innerHTML = buildPopupEdit(node);
                // Wire preview on edit file input
                const efi = contentDiv.querySelector('.edit-img-input');
                if (efi) efi.addEventListener('change', () => {
                  const f = efi.files[0];
                  const preview = document.getElementById(`edit-img-preview-${node.id}`);
                  if (f && preview) {
                    preview.src = URL.createObjectURL(f);
                    preview.style.display = 'block';
                    const lbl = contentDiv.querySelector('.edit-img-name');
                    if (lbl) lbl.textContent = f.name.length > 20 ? f.name.slice(0, 20) + '…' : f.name;
                  }
                });
              }
            }

          } else if (action === 'save-edit') {
            const idx = nodes.findIndex(x => x.id === id);
            if (idx !== -1) {
              const fields = {};
              el.querySelectorAll('[data-field]').forEach(inp => {
                const val = inp.value.trim();
                if (inp.dataset.field === 'lat' || inp.dataset.field === 'lon') {
                  fields[inp.dataset.field] = parseFloat(val);
                } else {
                  fields[inp.dataset.field] = val;
                }
              });
              if (isNaN(fields.lat) || isNaN(fields.lon)) return;
              // Upload new image if selected
              const fileInp = el.querySelector('.edit-img-input');
              if (fileInp && fileInp.files[0]) {
                const imgUrl = await uploadNodeImage(fileInp.files[0]);
                if (imgUrl) fields.imageUrl = imgUrl;
              }
              await apiUpdateNode(id, fields);
              Object.assign(nodes[idx], fields);
              const contentDiv = el.querySelector('.leaflet-popup-content');
              if (contentDiv) contentDiv.innerHTML = buildPopupView(nodes[idx]);
              // Only full re-render if coords changed (need to move marker)
              const coordsChanged = 'lat' in fields || 'lon' in fields;
              if (coordsChanged) {
                render();
                setTimeout(() => markers[id]?.openPopup(), 50);
              } else {
                renderSidebar();
                updateStats();
              }
            }

          } else if (action === 'cancel-edit') {
            const node = nodes.find(x => x.id === id);
            if (node) {
              const contentDiv = el.querySelector('.leaflet-popup-content');
              if (contentDiv) contentDiv.innerHTML = buildPopupView(node);
            }
          }
        });
      });

      markers[n.id] = m;
    }

    function renderSidebar() {
      const list = document.getElementById('mesh-node-list');
      if (!nodes.length) {
        list.innerHTML = '<div class="mesh-no-nodes">NO NODES REGISTERED</div>';
        return;
      }
      const filtered = nodes.filter(n => {
        if (nodeFilter === 'online')  return n.online !== false;
        if (nodeFilter === 'offline') return n.online === false;
        return true;
      });
      if (!filtered.length) {
        list.innerHTML = `<div class="mesh-no-nodes">NO ${nodeFilter.toUpperCase()} NODES</div>`;
        return;
      }
      list.innerHTML = '';
      filtered.forEach(n => {
        const item = document.createElement('div');
        item.className = 'mesh-node-item';
        item.dataset.id = n.id;
        item.innerHTML = `
          <div class="mesh-node-name">${escHtml(n.name)}</div>
          <div class="mesh-node-meta">
            <span class="mesh-node-status ${n.online !== false ? 'online' : 'offline'}"></span>
            ${Number(n.lat).toFixed(4)}, ${Number(n.lon).toFixed(4)}
          </div>
        `;
        item.addEventListener('click', () => {
          document.querySelectorAll('.mesh-node-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          map.flyTo([n.lat, n.lon], 12, { duration: 0.8 });
          setTimeout(() => markers[n.id]?.openPopup(), 850);
        });
        list.appendChild(item);
      });
    }

    function render() {
      // Remove old markers
      Object.values(markers).forEach(m => map.removeLayer(m));
      Object.keys(markers).forEach(k => delete markers[k]);
      // Add nodes matching current filter
      const visible = nodes.filter(n => {
        if (nodeFilter === 'online')  return n.online !== false;
        if (nodeFilter === 'offline') return n.online === false;
        return true;
      });
      visible.forEach(n => addMarker(n));
      renderSidebar();
      updateStats();
    }

    async function deleteNode(id) {
      await apiDeleteNode(id);
      nodes = nodes.filter(n => n.id !== id);
      render();
    }

    // ── Click map to pre-fill coords ──────────────────────
    let clickedLatLon = null;
    const tip = document.getElementById('mesh-coords-tip');

    map.on('click', (e) => {
      clickedLatLon = e.latlng;
      document.getElementById('node-lat').value = e.latlng.lat.toFixed(5);
      document.getElementById('node-lon').value = e.latlng.lng.toFixed(5);
      tip.textContent = `SELECTED: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
      tip.style.color = 'var(--blue)';
    });

    // ── Image preview in add form ──────────────────────────
    document.getElementById('node-image').addEventListener('change', (e) => {
      const file = e.target.files[0];
      const preview = document.getElementById('node-img-preview');
      const nameEl  = document.getElementById('mesh-img-name');
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
        nameEl.textContent = file.name.length > 22 ? file.name.slice(0, 22) + '…' : file.name;
      } else {
        preview.style.display = 'none';
        nameEl.textContent = 'PHOTO (OPTIONAL)';
      }
    });

    // ── Add node form ─────────────────────────────────────
    document.getElementById('mesh-add-btn').addEventListener('click', async () => {
      const name    = document.getElementById('node-name').value.trim();
      const lat     = parseFloat(document.getElementById('node-lat').value);
      const lon     = parseFloat(document.getElementById('node-lon').value);
      const desc    = document.getElementById('node-desc').value.trim();
      const imgFile = document.getElementById('node-image').files[0];
      const msg     = document.getElementById('mesh-form-msg');
      const btn     = document.getElementById('mesh-add-btn');

      if (!name) { msg.style.color = '#FF4500'; msg.textContent = 'Node name required.'; return; }
      if (isNaN(lat) || isNaN(lon) || lat < -90 || lat > 90 || lon < -180 || lon > 180) {
        msg.style.color = '#FF4500'; msg.textContent = 'Valid coordinates required.'; return;
      }

      btn.disabled = true; btn.textContent = 'SAVING...';

      let imageUrl = '';
      if (imgFile) {
        btn.textContent = 'UPLOADING...';
        imageUrl = await uploadNodeImage(imgFile) || '';
      }

      const node = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        name, lat, lon, desc, online: true, imageUrl,
      };

      let saveErr = '';
      try {
        const res = await fetch('/api/mesh/nodes', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ nodeId: node.id, name: node.name, lat: node.lat, lon: node.lon, desc: node.desc, online: node.online, imageUrl: node.imageUrl }),
        });
        if (!res.ok) { const d = await res.json().catch(()=>{}); saveErr = d?.error || `HTTP ${res.status}`; }
      } catch (e) { saveErr = e.message; }
      btn.disabled = false; btn.textContent = '+ ADD NODE';

      if (saveErr) { msg.style.color = '#FF4500'; msg.textContent = saveErr; return; }

      nodes.push(node);
      render();
      map.flyTo([lat, lon], 12, { duration: 0.8 });
      setTimeout(() => markers[node.id]?.openPopup(), 850);

      document.getElementById('node-name').value  = '';
      document.getElementById('node-lat').value   = '';
      document.getElementById('node-lon').value   = '';
      document.getElementById('node-desc').value  = '';
      document.getElementById('node-image').value = '';
      document.getElementById('node-img-preview').style.display = 'none';
      document.getElementById('mesh-img-name').textContent = 'PHOTO (OPTIONAL)';
      clickedLatLon = null;
      tip.textContent = 'CLICK MAP TO PLACE NODE';
      tip.style.color = '';
      msg.style.color = '#27c93f'; msg.textContent = 'Node added.';
      setTimeout(() => { msg.textContent = ''; }, 2000);
    });

    // Allow Enter key on inputs to submit
    ['node-name','node-lat','node-lon','node-desc'].forEach(id => {
      document.getElementById(id)?.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('mesh-add-btn').click();
      });
    });

    // Initial load from database
    nodes = await apiLoadNodes();
    render();
  </script>
</body>
</html>
