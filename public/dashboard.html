<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN DASHBOARD</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/logo.css">
  <style>
    .dash-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .dash-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--blue-dark);
      background: rgba(10,10,10,0.92);
      position: relative;
      z-index: 2;
    }

    .dash-nav-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      color: var(--blue-dim);
    }

    .dash-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    .dash-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .dash-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      letter-spacing: 6px;
      color: #FF4500;
      text-shadow: 0 0 20px rgba(255,69,0,0.6), 0 0 40px rgba(255,69,0,0.2);
      margin-bottom: 8px;
    }

    .dash-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--blue-dark);
    }

    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 860px;
      width: 100%;
    }

    @media (max-width: 700px) {
      .dash-grid {
        grid-template-columns: 1fr;
        max-width: 360px;
      }
    }

    .dash-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px;
      background: rgba(13,13,13,0.95);
      border: 1px solid var(--blue-dark);
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .dash-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,69,0,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .dash-card:hover {
      border-color: #FF4500;
      box-shadow: 0 0 20px rgba(255,69,0,0.2), 0 0 40px rgba(255,69,0,0.05);
      transform: translateY(-2px);
    }

    .dash-card-icon {
      height: 40px;
      margin-bottom: 16px;
      color: #FF4500;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 6px rgba(255,69,0,0.45));
    }

    .dash-card-icon svg {
      height: 40px;
      width: auto;
    }

    .dash-card-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      letter-spacing: 4px;
      color: #FF4500;
      text-shadow: 0 0 10px rgba(255,69,0,0.4);
      margin-bottom: 8px;
    }

    .dash-card-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--blue-dark);
      text-align: center;
      line-height: 1.6;
    }

    .dash-card-arrow {
      margin-top: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--blue-dark);
      transition: color 0.2s;
    }

    .dash-card:hover .dash-card-arrow {
      color: #FF4500;
    }

    .signout-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--blue-dim);
      background: none;
      border: 1px solid var(--blue-dark);
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .signout-btn:hover {
      color: var(--blue);
      border-color: var(--blue);
      box-shadow: 0 0 8px var(--blue-glow);
    }
  </style>
</head>
<body>
  <canvas id="matrix-rain"></canvas>

  <div class="dash-page">
    <!-- Nav -->
    <nav class="dash-nav">
      <div class="dash-nav-title">ADMIN DASHBOARD</div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;display:flex;align-items:center;gap:6px;">
          <span style="width:7px;height:7px;border-radius:50%;background:#27c93f;box-shadow:0 0 6px #27c93f;display:inline-block;"></span>
          <span style="color:#FF4500;">ONLINE</span>
        </div>
        <button class="signout-btn" id="signout-btn">SIGN OUT</button>
      </div>
    </nav>

    <!-- Body -->
    <div class="dash-body">
      <div class="dash-header">
        <div class="dash-title">CONTROL HUB</div>
        <div class="dash-sub">SELECT A SYSTEM TO MANAGE</div>
      </div>

      <div class="dash-grid">

              <rect x="14" y="11" width="3" height="3" rx="0.3" fill="none" stroke="#5DADE2" stroke-width="1"/>
              <rect x="18" y="11" width="3" height="3" rx="0.3" fill="none" stroke="#5DADE2" stroke-width="1"/>
              <rect x="22" y="11" width="3" height="3" rx="0.3" fill="none" stroke="#5DADE2" stroke-width="1"/>
              <rect x="26" y="11" width="3" height="3" rx="0.3" fill="none" stroke="#5DADE2" stroke-width="1"/>
              <rect x="30" y="11" width="3" height="3" rx="0.3" fill="none" stroke="#5DADE2" stroke-width="1"/>
              <rect x="34" y="11" width="3" height="3" rx="0.3" fill="none" stroke="#5DADE2" stroke-width="1"/>
              <circle cx="7.5"  cy="17" r="1" fill="#27c93f"/>
              <circle cx="11.5" cy="17" r="1" fill="#ffbd2e"/>
              <circle cx="15.5" cy="17" r="1" fill="#27c93f"/>
              <circle cx="19.5" cy="17" r="1" fill="#ffbd2e"/>
              <circle cx="23.5" cy="17" r="1" fill="#27c93f"/>
              <circle cx="27.5" cy="17" r="1" fill="#ffbd2e"/>
              <circle cx="31.5" cy="17" r="1" fill="#27c93f"/>
              <circle cx="35.5" cy="17" r="1" fill="#ffbd2e"/>
              <circle cx="52"   cy="15" r="1.5" fill="currentColor"/>
            </svg>
          </div>
          <div class="dash-card-name">BLUE-NET</div>
          <div class="dash-card-desc">NETWORK SERVICES<br>FIBER & INTERNET SOLUTIONS</div>
          <div class="dash-card-arrow">ENTER →</div>
        </a>

        <!-- Blue-Meshtastic -->
        <a href="/mesh" class="dash-card">
          <!-- Blue-Meshtastic mesh node logo -->
          <div class="dash-card-icon">
            <svg viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg" style="color:#FF4500;">
              <line x1="8"  y1="15" x2="30" y2="5"  stroke="currentColor" stroke-width="1"   opacity="0.45"/>

              <line x1="30" y1="5"  x2="20" y2="25" stroke="currentColor" stroke-width="1"   opacity="0.45"/>
              <line x1="30" y1="5"  x2="40" y2="25" stroke="currentColor" stroke-width="1"   opacity="0.45"/>
              <line x1="52" y1="15" x2="40" y2="25" stroke="currentColor" stroke-width="1"   opacity="0.45"/>

              <path d="M54 13 Q58 15 54 17" fill="none" stroke="#27c93f" stroke-width="1"   opacity="0.8"/>
              <path d="M55 11 Q59 15 55 19" fill="none" stroke="#27c93f" stroke-width="0.8" opacity="0.45"/>
              <circle cx="8"  cy="15" r="3"   fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="8"  cy="15" r="1.2" fill="currentColor" opacity="0.65"/>
              <circle cx="30" cy="5"  r="3"   fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.3"/>
              <circle cx="30" cy="5"  r="1.2" fill="currentColor" opacity="0.65"/>
              <circle cx="52" cy="15" r="3"   fill="#27c93f" fill-opacity="0.18" stroke="#27c93f" stroke-width="1.3"/>
              <circle cx="52" cy="15" r="1.3" fill="#27c93f"/>
              <circle cx="20" cy="25" r="2.5" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.1"/>

            </svg>
          </div>
          <div class="dash-card-name">BLUE-MESHTASTIC</div>
          <div class="dash-card-desc">RADIO MESH NETWORK<br>NODE MANAGEMENT</div>
          <div class="dash-card-arrow">ENTER →</div>
        </a>

        <!-- Blue-TIP -->
        <a href="/bluetip" class="dash-card">
          <!-- Blue-TIP welding gun logo -->
          <div class="dash-card-icon">
            <svg viewBox="0 0 80 36" xmlns="http://www.w3.org/2000/svg">
              <path d="M22 30 Q8 37 2 28 Q-2 19 6 13 Q11 8 17 11" fill="none" stroke="#5DADE2" stroke-width="2.1" stroke-linecap="round"/>

              <circle cx="34.5" cy="11" r="0.8" fill="currentColor" opacity="0.38"/>

              <path d="M45 22 Q50 25 54 22 Q57 21 58 21.5" fill="none" stroke="#FF4500" stroke-width="2.2" stroke-linecap="round"/>
              <rect x="57" y="8.5" width="10" height="15" rx="1.2" fill="#FF4500" fill-opacity="0.09" stroke="#FF4500" stroke-width="1.4"/>
              <line x1="61" y1="8.5" x2="61" y2="23.5" stroke="#FF4500" stroke-width="0.8" opacity="0.4"/>
              <circle cx="64.5" cy="12" r="0.7" fill="#5DADE2" opacity="0.4"/>
              <circle cx="64.5" cy="16" r="0.7" fill="#5DADE2" opacity="0.4"/>
              <circle cx="64.5" cy="20" r="0.7" fill="#5DADE2" opacity="0.4"/>
              <path d="M67 10 L71 16 L67 22" fill="#5DADE2" opacity="0.72"/>
              <circle cx="73" cy="16" r="4.5" fill="none" stroke="#5DADE2" stroke-width="0.9" opacity="0.22"/>
              <circle cx="73" cy="16" r="2.1" fill="#5DADE2" opacity="0.95"/>
              <line x1="73" y1="16" x2="79" y2="8"  stroke="#5DADE2" stroke-width="1.4" stroke-linecap="round"/>
              <line x1="73" y1="16" x2="80" y2="16" stroke="#5DADE2" stroke-width="1.2" stroke-linecap="round"/>
              <line x1="73" y1="16" x2="79" y2="24" stroke="#5DADE2" stroke-width="1.4" stroke-linecap="round"/>
              <circle cx="79" cy="8"  r="1.2" fill="#5DADE2"/>
              <circle cx="80" cy="16" r="1"   fill="#5DADE2"/>
              <circle cx="79" cy="24" r="1.2" fill="#5DADE2"/>
            </svg>
          </div>
          <div class="dash-card-name">BLUE-TIP</div>
          <div class="dash-card-desc">MOBILE WELDING<br>FIELD & FABRICATION SERVICES</div>
          <div class="dash-card-arrow">ENTER →</div>
        </a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initMatrixRain } from '/js/matrix-rain.js';
    import { isLoggedIn, getRole, clearAuth } from '/js/auth.js';

    // Auth guard
    if (!isLoggedIn() || getRole() !== 'admin') {
      window.location.href = '/';
    }

    const rain = initMatrixRain('matrix-rain');
    if (rain) rain.start();

    document.getElementById('signout-btn').addEventListener('click', () => {
      clearAuth();
      window.location.href = '/';
    });
  </script>
</body>
</html>
