<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN DASHBOARD</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/logo.css">
  <style>
    .dash-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .dash-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--blue-dark);
      background: rgba(10,10,10,0.92);
      position: relative;
      z-index: 2;
    }

    .dash-nav-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      color: #FF4500;
      text-shadow: 0 0 20px rgba(255,69,0,0.6), 0 0 40px rgba(255,69,0,0.2);
    }

    .dash-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 24px;
      position: relative;
      z-index: 1;
    }

    /* Cross/plus layout — 3×3 grid, corners empty */
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, auto);
      gap: 18px;
      max-width: 740px;
      width: 100%;
    }

    .dash-card-mesh   { grid-column: 2; grid-row: 1; }  /* top center    */
    .dash-card-net    { grid-column: 1; grid-row: 2; }  /* middle left   */
    .dash-card-center { grid-column: 2; grid-row: 2; }  /* center hub    */
    .dash-card-sike   { grid-column: 3; grid-row: 2; }  /* middle right  */
    .dash-card-tip    { grid-column: 2; grid-row: 3; }  /* bottom center */

    .dash-center {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 14px;
      background: rgba(13,13,13,0.95);
      border: 1px solid rgba(255,69,0,0.3);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
    }

    .dash-center::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,69,0,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .dash-center-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      letter-spacing: 4px;
      color: #FF4500;
      text-shadow: 0 0 20px rgba(255,69,0,0.6), 0 0 40px rgba(255,69,0,0.2);
      margin-bottom: 6px;
    }

    .dash-center-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2.5px;
      color: var(--blue-dark);
      line-height: 1.7;
    }

    .dash-center-pulse {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #FF4500;
      box-shadow: 0 0 10px rgba(255,69,0,0.8);
      margin-bottom: 8px;
      animation: hub-pulse 2s ease-in-out infinite;
    }

    @keyframes hub-pulse {
      0%, 100% { box-shadow: 0 0 6px rgba(255,69,0,0.6); }
      50%       { box-shadow: 0 0 20px rgba(255,69,0,1), 0 0 40px rgba(255,69,0,0.4); }
    }

    @media (max-width: 600px) {
      .dash-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        max-width: 360px;
      }
      .dash-card-mesh,
      .dash-card-net,
      .dash-card-sike,
      .dash-card-tip { grid-column: 1; grid-row: auto; }
    }

    .dash-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px;
      background: rgba(13,13,13,0.95);
      border: 1px solid var(--blue-dark);
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .dash-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,69,0,0.03) 0%, transparent 60%);
      pointer-events: none;
    }

    .dash-card:hover {
      border-color: #FF4500;
      box-shadow: 0 0 20px rgba(255,69,0,0.2), 0 0 40px rgba(255,69,0,0.05);
      transform: translateY(-2px);
    }

    .dash-card-icon {
      height: 34px;
      margin-bottom: 12px;
      color: #FF4500;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 6px rgba(255,69,0,0.45));
    }

    .dash-card-icon svg {
      height: 34px;
      width: auto;
    }

    .dash-card-name {
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      letter-spacing: 3px;
      color: #FF4500;
      text-shadow: 0 0 10px rgba(255,69,0,0.4);
      margin-bottom: 6px;
    }

    .dash-card-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--blue-dark);
      text-align: center;
      line-height: 1.5;
    }

    .dash-card-arrow {
      margin-top: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--blue-dark);
      transition: color 0.2s;
    }

    .dash-card:hover .dash-card-arrow {
      color: #FF4500;
    }

    .signout-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--blue-dim);
      background: none;
      border: 1px solid var(--blue-dark);
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .signout-btn:hover {
      color: var(--blue);
      border-color: var(--blue);
      box-shadow: 0 0 8px var(--blue-glow);
    }
  </style>
</head>
<body>

        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;display:flex;align-items:center;gap:6px;">

          </div>

          <div class="dash-card-name">BLUE-TIP</div>
          <div class="dash-card-desc">MOBILE WELDING<br>FIELD & FABRICATION SERVICES</div>
          <div class="dash-card-arrow">ENTER →</div>
        </a>

        <!-- Blue-NET — middle left -->
        <a href="/admin" class="dash-card dash-card-net">
          <div class="dash-card-icon">

  <script type="module">
    import { initMatrixRain } from '/js/matrix-rain.js';
    import { isLoggedIn, getRole, clearAuth } from '/js/auth.js';

    // Auth guard
    if (!isLoggedIn() || getRole() !== 'admin') {
      window.location.href = '/';
    }

    const rain = initMatrixRain('matrix-rain');
    if (rain) rain.start();

    document.getElementById('signout-btn').addEventListener('click', () => {
      clearAuth();
      window.location.href = '/';
    });
  </script>
</body>
</html>
